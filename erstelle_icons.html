<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Icon Generator für Sonnenaufgang App</title>
    <style>
        body {
            background: linear-gradient(135deg, #0b0f19 0%, #1a1528 100%);
            color: #fff3e0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 253, 240, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 243, 224, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffb74d; margin-top: 0; }
        button {
            background: #ffb74d;
            border: none;
            color: #0b0f19;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 15px rgba(255, 183, 77, 0.4);
        }
        button:hover { background: #ffe082; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .preview {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        canvas {
            background: #0f131e;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Icon Generator</h1>
    <p>Klicke auf den Button, um die App-Icons direkt im passenden Format herunterzuladen.</p>
    
    <div class="preview">
        <div class="preview-box">
            <canvas id="canvas128" width="128" height="128"></canvas>
            <span>128x128</span>
        </div>
        <div class="preview-box">
            <canvas id="canvas48" width="48" height="48"></canvas>
            <span>48x48</span>
        </div>
        <div class="preview-box">
            <canvas id="canvas16" width="16" height="16"></canvas>
            <span>16x16</span>
        </div>
    </div>

    <button id="download-btn">Icons generieren & downloaden</button>
</div>

<script>
    function drawIcon(canvasId, size) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        
        // Hintergrund transparent oder passend zum Theme machen
        // Da Erweiterungs-Icons meist transparent sind, füllen wir den Hintergrund hier nicht,
        // sondern zeichnen die Sonne direkt auf den transparenten Canvas.
        ctx.clearRect(0, 0, size, size);
        
        const center = size / 2;
        const sunRadius = size * 0.25;
        
        // Falls wir Glow-Effekte nutzen, passen wir den Schatten proportional an
        if (size > 16) {
            ctx.shadowColor = "rgba(255, 143, 0, 0.6)";
            ctx.shadowBlur = size * 0.12;
        }

        // Farbverlauf für die Sonne (Morgenröte-Style)
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#ffe082'); // Helles Gelb oben links
        gradient.addColorStop(0.5, '#ffb74d'); // Warmes Orange in der Mitte
        gradient.addColorStop(1, '#ff9100'); // Kräftiges Dunkelorange unten rechts
        
        // Sonnenstrahlen zeichnen (8 Strahlen)
        ctx.strokeStyle = gradient;
        ctx.lineWidth = size * 0.06;
        ctx.lineCap = "round";
        
        const numRays = 8;
        const startDist = sunRadius * 1.4;
        const endDist = sunRadius * 1.85;
        
        for (let i = 0; i < numRays; i++) {
            const angle = (i * 2 * Math.PI) / numRays;
            const x1 = center + Math.cos(angle) * startDist;
            const y1 = center + Math.sin(angle) * startDist;
            const x2 = center + Math.cos(angle) * endDist;
            const y2 = center + Math.sin(angle) * endDist;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        
        // Sonnenkern zeichnen
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(center, center, sunRadius, 0, 2 * Math.PI);
        ctx.fill();
    }

    // Icons auf den Canvas-Elementen vorzeichnen
    drawIcon('canvas128', 128);
    drawIcon('canvas48', 48);
    drawIcon('canvas16', 16);

    // Download-Funktion für die einzelnen Größen
    function triggerDownload(canvasId, filename) {
        const canvas = document.getElementById(canvasId);
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    document.getElementById('download-btn').addEventListener('click', () => {
        triggerDownload('canvas16', 'icon16.png');
        // Kleiner Timeout, damit der Browser die multiplen Downloads nicht blockiert
        setTimeout(() => triggerDownload('canvas48', 'icon48.png'), 150);
        setTimeout(() => triggerDownload('canvas128', 'icon128.png'), 300);
    });
</script>

</body>
</html>
